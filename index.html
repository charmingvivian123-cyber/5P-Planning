const NOW_YEAR = 2026;
const NOW_MONTH = 3; // 0-indexed, April = 3

function generateMonths(startYear, startMonth, endYear, endMonth) {
  const result = [];
  let y = startYear, m = startMonth;
  while (y < endYear || (y === endYear && m <= endMonth)) {
    const key = MONTH_NAMES[m].toLowerCase() + (y > NOW_YEAR ? String(y) : '');
    result.push({
      key,
      label: MONTH_NAMES[m] + '-' + String(y),
      cur: (y === NOW_YEAR && m === NOW_MONTH),
      year: y,
      month: m,
    });
    m++;
    if (m > 11) { m = 0; y++; }
  }
  return result;
}

const fmtLog = (v) => (v===null||v===undefined||v==='') ? '—' : String(v);

function hashInt(str) {
  let h = 2166136261;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}

function demoFillValue({series, field, variant, monthKey}) {
  const h = hashInt(`${series}|${field}|${variant || ''}|${monthKey}`);
  if (field === 'natStock' || field === 'dealerStock') return 300 + (h % 500);
  if (field === 'daySupplyNat' || field === 'daySupplyDlr') return 30 + (h % 90);
  if (field === 'deviation') return (h % 7) === 0 ? (h % 15) : 0;
  if (field === 'ata') return (h % 5) === 0 ? 0 : 100 + (h % 350);
  if (variant) return 20 + (h % 220);
  return 120 + (h % 360);
}

function calcSelectCh(values, extra = 4, min = 18, max = 44) {
  const maxLen = (values || []).reduce((m, v) => Math.max(m, String(v || '').length), 0);
  const ch = Math.min(max, Math.max(min, maxLen + extra));
  return `${ch}ch`;
}

function fillDemoAllData(allData, opts = {}) {
  const preserveChinaFuture = !!opts.preserveChinaFuture;
  const nowAbs = NOW_YEAR * 12 + NOW_MONTH;
  const isFuture = (m) => (m.year * 12 + m.month) > nowAbs;
  const fields = ['chinaProduction','kdFactory','etd','eta','ata','deviation','invoice','natStock','daySupplyNat','delivery','dealerStock','daySupplyDlr'];
  const out = {};
  SERIES_LIST.forEach(series => {
    const src = allData?.[series] || {};
    const nextSeries = {};
    fields.forEach(field => {
      const srcObj = src[field] || {};
      const dstObj = {};
      MONTHS.forEach(m => {
        const v = srcObj[m.key];
        const shouldPreserveEmpty = preserveChinaFuture && field === 'chinaProduction' && isFuture(m);
        if(shouldPreserveEmpty) {
          dstObj[m.key] = (v === null || v === undefined) ? null : v;
        } else {
          dstObj[m.key] = (v === null || v === undefined)
            ? demoFillValue({series, field, monthKey: m.key})
            : v;
        }
      });
      nextSeries[field] = dstObj;
    });
    const srcVariants = src.variants || {};
    const dstVariants = {};
    Object.keys(srcVariants).forEach(name => {
      const srcObj = srcVariants[name] || {};
      const dstObj = {};
      MONTHS.forEach(m => {
        const v = srcObj[m.key];
        const shouldPreserveEmpty = preserveChinaFuture && isFuture(m);
        if(shouldPreserveEmpty) {
          dstObj[m.key] = (v === null || v === undefined) ? null : v;
        } else {
          dstObj[m.key] = (v === null || v === undefined)
            ? demoFillValue({series, field: 'chinaProduction', variant: name, monthKey: m.key})
            : v;
        }
      });
      dstVariants[name] = dstObj;
    });
    nextSeries.variants = dstVariants;
    out[series] = { ...src, ...nextSeries };
  });
  return out;
}

function formatTS(ts) {
  const d = new Date(ts);
  const pad = (n) => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

function formatRelativeTime(ts) {
  if(!ts) return '';
  const s = Math.max(0, Math.floor((Date.now() - ts) / 1000));
  if(s < 60) return `${s}秒前`;
  const m = Math.floor(s / 60);
  if(m < 60) return `${m}分钟前`;
  const h = Math.floor(m / 60);
  if(h < 24) return `${h}小时前`;
  const d = Math.floor(h / 24);
  return `${d}天前`;
}

/* ─── CELL (editable or read-only) ─── */
function Cell({val, editable, cur, onChange}) {
  const [editing,setEditing] = useState(false);
  const [tmp,setTmp] = useState('');
  const inp = useRef();
  const startEdit = () => { if(!editable) return; setTmp(val??''); setEditing(true); setTimeout(()=>inp.current&&inp.current.select(),50); };
  const commit = () => { const n=parseInt(tmp,10); onChange(isNaN(n)?null:n); setEditing(false); };
  const cls = ['td-'+(cur?'cur':'num'), editable?'editable':'', val<0?'neg':''].filter(Boolean).join(' ');
  if(editing) return <td className={cls} style={cur?{background:'#fff9f9'}:{}}><input ref={inp} className="cell-inp" value={tmp} onChange={e=>setTmp(e.target.value)} onBlur={commit} onKeyDown={e=>{if(e.key==='Enter')commit(); if(e.key==='Escape')setEditing(false);}} /></td>;
  return <td className={cls} style={cur?{background:'#fff9f9'}:{}} onClick={startEdit}>{fmtN(val)}</td>;
}

/* ─── LOG MODAL ─── */
function LogModal({onClose, logs, mode = 'submission', monthVersion}) {

  const formatMonthVersionLabel = (key) => {
    const [yy, mm] = String(key).split('-').map(n => parseInt(n, 10));
    if(!yy || !mm) return key;
    const mIdx = mm - 1;
    return `${MONTH_NAMES[mIdx]}-${yy}`;
  };

  const buildSubmissionRows = () => (logs && logs.length ? logs : INIT_LOGS.map(l => ({
    ver: l.ver,
    date: l.date,
    operator: l.operator,
    operation: `Submit v${l.ver}`,
  })));

  const buildSummaryProdRows = () => {
    const key = monthVersion || `${NOW_YEAR}-${String(NOW_MONTH + 1).padStart(2,'0')}`;
    const label = formatMonthVersionLabel(key);
    const base = (logs && logs.length) ? logs[0] : INIT_LOGS[0];
    return [{
      ver: base?.ver ?? '',
      date: base?.date ?? '',
      operator: base?.operator ?? '',
      operation: `Lock the month version of ${label}`,
    }];
  };

  const rows = mode === 'summaryProd' ? buildSummaryProdRows() : buildSubmissionRows();
  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{width:640}}>
        <div className="modal-hd">
          <h3>Log</h3>

const FIELD_DEFS = [
  { field:'chinaProduction', label:'China Production',     expandable:true },
  { field:'kdFactory',       label:'KD Factory Production',formula:true, expandable:true },
  { field:'etd',             label:'ETD',                   formula:true, expandable:true },
  { field:'eta',             label:'ETA',                   formula:true, expandable:true },
  { field:'ata',             label:'Actual Arrival',        expandable:true },
  { field:'deviation',       label:'Deviation',             formula:true, expandable:true },
  { field:'_divider1' },
  { field:'invoice',         label:'B-end Delivery',        formula:true, expandable:true },
  { field:'natStock',        label:'National Stock',        formula:true, expandable:true },
  { field:'daySupplyNat',    label:'Day Supply (National)', formula:true, expandable:true },
  { field:'_divider2' },
  { field:'delivery',        label:'C-end Delivery',        formula:true, expandable:true },
  { field:'dealerStock',     label:'Dealer Stock',          formula:true, expandable:true },
  { field:'daySupplyDlr',    label:'Day Supply (Dealer)',   formula:true, expandable:true },
];

function PlanningTable({editMode, summaryPublished, activeSeries, allData, onSetCell, onSetVariant, editingVariant, setEditingVariant, editableMonthKeys, canEditVariantRow, calcParamsBySeries, onDeleteVariant}) {
  const [expandedFields, setExpandedFields] = useState({ chinaProduction: true });

  const isAllMode = activeSeries === 'All';
  const seriesList = isAllMode ? SERIES_LIST : [activeSeries];

  const toggleExpand = (field) => setExpandedFields(e => ({ ...e, [field]: !e[field] }));

  const isLocked = (mkey) => summaryPublished && mkey === 'mar';
  const canEdit = (mkey) => editMode && !isLocked(mkey);

  const idxByKey = useMemo(() => {
    const o = {};
    MONTHS.forEach((m, i) => { o[m.key] = i; });
    return o;
  }, []);

  const shiftObj = useCallback((src, offset) => {
    const out = {};
    MONTHS.forEach((m, i) => {
      const raw = i - (offset || 0);
      let j = raw;
      while (j < 0) j += 12;
      if(j < 0 || j >= MONTHS.length) out[m.key] = null;
      else out[m.key] = (src && src[MONTHS[j].key] !== undefined) ? src[MONTHS[j].key] : null;
    });
    return out;
  }, []);

  const fieldOffset = useCallback((field, params) => {
    const p = params || {};
    if(field === 'kdFactory') return p.kdProdMonths || 0;
    if(field === 'etd') return p.etdMonths || 0;
    if(field === 'eta') return p.etaMonths || 0;
    if(field === 'invoice') return p.bEndDeliveryMonths || 0;
    if(field === 'delivery') return p.cEndDeliveryMonths || 0;
    return 0;
  }, []);

  const getValsForField = useCallback((series, data, field) => {
    if(!data) return null;
    if(field === 'chinaProduction') return data.chinaProduction;
    const params = calcParamsBySeries ? calcParamsBySeries[series] : null;
    const off = fieldOffset(field, params);
    if(off && (field === 'kdFactory' || field === 'etd' || field === 'eta' || field === 'invoice' || field === 'delivery')) {
      return shiftObj(data.chinaProduction, off);
    }
    return data[field];
  }, [calcParamsBySeries, fieldOffset, shiftObj]);

  const getVariantForField = useCallback((series, data, field, variantName) => {
    const v = data?.variants?.[variantName];
    if(!v) return null;
    if(field === 'chinaProduction') return v;
    const params = calcParamsBySeries ? calcParamsBySeries[series] : null;
    const off = fieldOffset(field, params);
    if(off && (field === 'kdFactory' || field === 'etd' || field === 'eta' || field === 'invoice' || field === 'delivery')) {
      return shiftObj(v, off);
    }
    return v;
  }, [calcParamsBySeries, fieldOffset, shiftObj]);

  const colSpan = 1 + MONTHS.length;

  const renderFieldRows = (series, fd, idx) => {
    if(fd.field.startsWith('_divider')) {
      return [<tr key={fd.field+'_'+series} className="divider"><td colSpan={colSpan}></td></tr>];
    }
    const data = allData[series];
    if(!data) return null;
    const vals = getValsForField(series, data, fd.field);
    const rows = [];

    const isChina = fd.field === 'chinaProduction';
    const editableThisField = isChina;
    const expanded = !!expandedFields[fd.field];

    // main field row
    if(editableThisField) {
      rows.push(
        <tr key={series+'_'+fd.field}>
          {isAllMode && idx===0 ? null : null}
          <td className="td-field">
            {fd.expandable ? <span className={'arr'+(expanded?' open':'')} onClick={() => toggleExpand(fd.field)} aria-label={expanded ? 'Collapse' : 'Expand'}></span> : null}
            {fd.label}
          </td>
          {MONTHS.map(m=>(
            <Cell key={m.key} val={vals[m.key]} editable={canEdit(m.key)} cur={m.cur}
              onChange={v=>onSetCell(series,fd.field,m.key,v)} />
          ))}
        </tr>
      );
    } else {
      rows.push(
        <tr key={series+'_'+fd.field}>
          <td className="td-field" style={{fontWeight:500,fontSize:13}}>
            {fd.expandable ? <span className={'arr'+(expanded?' open':'')} onClick={() => toggleExpand(fd.field)} aria-label={expanded ? 'Collapse' : 'Expand'}></span> : null}
            {fd.label}
          </td>
          {MONTHS.map(m=>{
            const v = vals[m.key];
            const locked = isLocked(m.key);
            return <td key={m.key} className={[m.cur?'td-cur':'', v<0?'neg':'', fd.formula?'formula-cell':''].filter(Boolean).join(' ')}
              style={locked?{background:'#fafafa'}:{}}>{fmtN(v)}</td>;
          })}
        </tr>
      );
    }

    if(fd.expandable && expanded) {
      const variantMap = data.variants || {};
      const keys = Object.keys(variantMap);
      if(keys.length) {
        const order = [];
        VARIANT_NAMES.forEach(n => { if(keys.includes(n)) order.push(n); });
        keys.filter(k => !order.includes(k)).sort().forEach(k => order.push(k));

        order.forEach(name => {
          const vvals = getVariantForField(series, data, fd.field, name);
          const rowKey = `${series}||${name}`;
          const isEditingRow = isChina && typeof editingVariant === 'string' && editingVariant === rowKey;

          rows.push(
            <tr key={series+'_'+fd.field+'_cfg_'+name}>
              <td className="td-sub" style={isChina ? {paddingLeft:10} : {paddingLeft:28}}>
                {isChina
                  ? (
                    <span style={{display:'inline-flex',alignItems:'center',gap:8}}>
                      <button className="btn-danger-txt" disabled={!canEditVariantRow} onClick={(e)=>{e.stopPropagation(); if(!canEditVariantRow) return; onDeleteVariant && onDeleteVariant(series, name);}}>Delete</button>
                      <button className="btn-link" disabled={!canEditVariantRow} onClick={(e)=>{e.stopPropagation(); if(!canEditVariantRow) return; setEditingVariant(cur => cur === rowKey ? null : rowKey);}}>
                        {isEditingRow ? 'Save' : 'Edit'}
                      </button>
                      <span>{name}</span>
                    </span>
                  )
                  : name
                }
              </td>
              {MONTHS.map(m => {
                const locked = isLocked(m.key);
                const inEditableRange = editableMonthKeys && editableMonthKeys.includes(m.key);
                const canEditThisCell = canEditVariantRow && isEditingRow && inEditableRange && !locked;

                if(canEditThisCell) {
                  const curVal = (variantMap[name] || {})[m.key];
                  return (
                    <Cell key={m.key} val={curVal} editable={true} cur={m.cur}
                      onChange={v=>onSetVariant(series, name, m.key, v)} />
                  );
                }

                const cls = ['td-num', m.cur ? 'td-cur' : '', locked ? '' : ''].filter(Boolean).join(' ');
                const val = vvals && vvals[m.key] !== undefined && vvals[m.key] !== null ? fmtN(vvals[m.key]) : '-';
                return (
                  <td key={m.key} className={cls} style={locked ? {background:'#fafafa'} : {}}>
                    {val}
                  </td>
                );
              })}
            </tr>
          );
        });
      }
    }
    return rows;
  };

  const renderSeriesBlock = (series) => {
    const blockRows = [];
    // series header row (only in All mode)
    if(isAllMode) {
      blockRows.push(
        <tr key={'hdr_'+series} className="series-hdr">
          <td colSpan={colSpan} style={{background:'#f0f5ff',fontWeight:700,fontSize:13,color:'#1677ff',padding:'8px 10px',borderBottom:'2px solid #d6e4ff'}}>
            {series}
          </td>
        </tr>
      );
    }
    FIELD_DEFS.forEach((fd,idx)=>{
      const r = renderFieldRows(series, fd, idx);
      if(r) blockRows.push(...(Array.isArray(r)?r:[r]));
    });
    return blockRows;
  };

  return (
    <div className="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th className="th-field">Field</th>
            {MONTHS.map(m=>(
              <th key={m.key} className={'month-col'+(m.cur?' th-cur':'')} style={{minWidth:88}}>
                {m.label}
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {seriesList.map(s=>renderSeriesBlock(s))}
        </tbody>
      </table>
    </div>
  );
}

/* ─── SUBMISSION TAB ─── */
function SubmissionTab({summaryPublished}) {
  const [country, setCountry] = useState('Norway');
  const [series,  setSeries]  = useState('X9(H93aEV)');
  const currentVersionKey = `${NOW_YEAR}-${String(NOW_MONTH + 1).padStart(2,'0')}`;
  const [monthVersion, setMonthVersion] = useState(currentVersionKey);
  const [activeCountry, setActiveCountry] = useState('Norway');
  const [activeSeries,  setActiveSeries]  = useState('X9(H93aEV)');
  const [activeVersion, setActiveVersion] = useState(currentVersionKey);
  const [versionMonths, setVersionMonths] = useState(VERSION_MONTHS);
  const [settingsRows, setSettingsRows] = useState(INIT_SETTINGS);
  const [showSettings, setShowSettings] = useState(false);
  const [showLog,      setShowLog]      = useState(false);
  const [showPublish,  setShowPublish]  = useState(false);
  const [published,    setPublished]    = useState(false);
  const [allData, setAllData] = useState(INIT_ALL_DATA);
  const [lastSavedAt, setLastSavedAt] = useState(null);
  const [editingVariantKey, setEditingVariantKey] = useState(null);
  const [opLogs, setOpLogs] = useState([]);
  const [preserveChinaFuture, setPreserveChinaFuture] = useState(false);

  const onSearch = () => {
    setActiveCountry(country);
    setActiveSeries(series);
    setActiveVersion(monthVersion);
  };
  const onPublish = () => { setPublished(true); setShowPublish(false); };

  const versionLabel = versionMonths.find(v=>v.key===activeVersion)?.label || activeVersion;
  const isAllMode = activeSeries === 'All';

  const activeParams = useMemo(() => {
    if(activeSeries === 'All') return null;
    let pool = settingsRows.filter(r =>
      Array.isArray(r.countries) && r.countries.includes(activeCountry) &&
      Array.isArray(r.vehicleSeries) && r.vehicleSeries.includes(activeSeries)
    );
    return pool[0] || null;
  }, [settingsRows, activeCountry, activeSeries]);

  const calcParamsBySeries = useMemo(() => {
    const map = {};
    SERIES_LIST.forEach(s => {
      let pool = settingsRows.filter(r =>
        Array.isArray(r.countries) && r.countries.includes(activeCountry) &&
        Array.isArray(r.vehicleSeries) && r.vehicleSeries.includes(s)
      );
      map[s] = pool[0] || null;
    });
    return map;
  }, [settingsRows, activeCountry]);

  const draftKeyFor = (kind, c, s, v) => `5p_draft_${kind}_${c}_${s}_${v}`;
  const draftKey = (kind) => draftKeyFor(kind, activeCountry, activeSeries, activeVersion);

  useEffect(() => {
    const current = currentVersionKey;
    const has = VERSION_MONTHS.some(v => v.key === current);
    if(!has) {
      setVersionMonths(vs => [{ key: current, label: formatVersionLabel(current) }, ...vs]);
    }
    setMonthVersion(current);
    setActiveVersion(current);
  }, []);

  useEffect(() => {
    const metaRaw = localStorage.getItem(draftKey('meta'));
    let keepChinaFutureEmpty = false;
    if(metaRaw) {
      try {
        const meta = JSON.parse(metaRaw);
        if(meta?.ts) setLastSavedAt(meta.ts);
        keepChinaFutureEmpty = !!meta?.preserveChinaFuture;
      } catch {}
    } else {
      setLastSavedAt(null);
    }
    setPreserveChinaFuture(keepChinaFutureEmpty);
    const dataRaw = localStorage.getItem(draftKey('data'));
    if(dataRaw) {
      try {
        const parsed = JSON.parse(dataRaw);
        if(parsed && typeof parsed === 'object') setAllData(fillDemoAllData(parsed, { preserveChinaFuture: keepChinaFutureEmpty }));
      } catch {}
    } else {
      setAllData(fillDemoAllData(INIT_ALL_DATA, { preserveChinaFuture: keepChinaFutureEmpty }));
    }
    setEditingVariantKey(null);
    setOpLogs([]);
  }, [activeCountry, activeSeries, activeVersion]);

  const persistDraft = (nextData) => {
    try {
      const ts = Date.now();
      localStorage.setItem(draftKey('data'), JSON.stringify(nextData));
      let prev = {};
      try { prev = JSON.parse(localStorage.getItem(draftKey('meta')) || '{}') || {}; } catch {}
      localStorage.setItem(draftKey('meta'), JSON.stringify({ ...prev, ts, preserveChinaFuture }));
      setLastSavedAt(ts);
    } catch {}
  };

  const setCell = (s, field, key, val) => setAllData(d => {
    const prev = d?.[s]?.[field]?.[key];
    if(prev === val) return d;
    const ts = Date.now();
    const fieldLabel = (FIELD_DEFS.find(f => f.field === field)?.label) || field;
    const monthLabel = (MONTHS.find(m => m.key === key)?.label) || key;
    setOpLogs(ls => ([{
      id: `${ts}_${Math.random().toString(16).slice(2)}`,
      ver: '',
      date: formatTS(ts),
      operator: 'You',
      operation: `${s} / ${fieldLabel} (Total) / ${monthLabel}: ${fmtLog(prev)} → ${fmtLog(val)}`,
    }, ...ls]));
    const next = ({
      ...d,
      [s]: {
        ...d[s],
        [field]: {
          ...d[s][field],
          [key]: val,
        },
      },
    });
    persistDraft(next);
    return next;
  });

  const setVariant = (s, name, key, val) => setAllData(d => {
    const prev = d?.[s]?.variants?.[name]?.[key];
    if(prev === val) return d;
    const ts = Date.now();
    const fieldLabel = (FIELD_DEFS.find(f => f.field === 'chinaProduction')?.label) || 'China Production';
    const monthLabel = (MONTHS.find(m => m.key === key)?.label) || key;
    setOpLogs(ls => ([{
      id: `${ts}_${Math.random().toString(16).slice(2)}`,
      ver: '',
      date: formatTS(ts),
      operator: 'You',
      operation: `${s} / ${fieldLabel} / ${name} / ${monthLabel}: ${fmtLog(prev)} → ${fmtLog(val)}`,
    }, ...ls]));
    const next = ({
      ...d,
      [s]: {
        ...d[s],
        variants: {
          ...(d[s].variants || {}),
          [name]: {
            ...((d[s].variants || {})[name] || {}),
            [key]: val,
          },
        },
      },
    });
    persistDraft(next);
    return next;
  });

  const deleteVariant = (s, name) => {
    const ok = confirm(`Delete ${name}?`);
    if(!ok) return;
    const ts = Date.now();
    setAllData(d => {
      const cur = d?.[s]?.variants || {};
      const nextVariants = { ...cur };
      delete nextVariants[name];
      const next = {
        ...d,
        [s]: {
          ...d[s],
          variants: nextVariants,
        },
      };
      persistDraft(next);
      return next;
    });
    setEditingVariantKey(cur => (cur === `${s}||${name}` ? null : cur));
    setOpLogs(ls => ([{
      id: `${ts}_${Math.random().toString(16).slice(2)}`,
      ver: '',
      date: formatTS(ts),
      operator: 'You',
      operation: `${s} / China Production / ${name}: Deleted`,
    }, ...ls]));
  };

  const addMonth = (key) => {
    const [yy, mm] = String(key).split('-').map(n => parseInt(n, 10));
    if(!yy || !mm) return null;
    const d = new Date(yy, mm - 1, 1);
    d.setMonth(d.getMonth() + 1);
    const y = d.getFullYear();
    const m = d.getMonth() + 1;
    return `${y}-${String(m).padStart(2,'0')}`;
  };

  const formatVersionLabel = (key) => {
    const [yy, mm] = String(key).split('-').map(n => parseInt(n, 10));
    if(!yy || !mm) return key;
    const mIdx = mm - 1;
    const base = `${MONTH_NAMES[mIdx]}-${yy}`;
    if(yy === NOW_YEAR && mIdx === NOW_MONTH) return `${base} (Current)`;
    return base;
  };

  const buildNewVersionData = (srcAll) => {
    const out = {};
    SERIES_LIST.forEach(s => {
      const src = (srcAll && srcAll[s]) ? srcAll[s] : INIT_ALL_DATA[s];
      const dst = {};
      Object.keys(src).forEach(k => {
        if(k === 'variants') return;
        const srcObj = src[k] || {};
        const dstObj = {};
        MONTHS.forEach(m => {
          const isHist = (m.year < NOW_YEAR) || (m.year === NOW_YEAR && m.month <= NOW_MONTH);
          dstObj[m.key] = isHist ? (srcObj[m.key] ?? null) : null;
        });
        dst[k] = dstObj;
      });
      const srcVariants = src.variants || {};
      const dstVariants = {};
      Object.keys(srcVariants).forEach(name => {
        const srcObj = srcVariants[name] || {};
        const dstObj = {};
        MONTHS.forEach(m => {
          const isHist = (m.year < NOW_YEAR) || (m.year === NOW_YEAR && m.month <= NOW_MONTH);
          dstObj[m.key] = isHist ? (srcObj[m.key] ?? null) : null;
        });
        dstVariants[name] = dstObj;
      });
      dst.variants = dstVariants;
      out[s] = dst;
    });
    return out;
  };

  const onAddVersion = () => {
    let newKey = addMonth(activeVersion);
    if(!newKey) return;
    const existing = new Set(versionMonths.map(v => v.key));
    while(existing.has(newKey)) {
      const next = addMonth(newKey);
      if(!next) break;
      newKey = next;
    }

    const newData = fillDemoAllData(buildNewVersionData(allData), { preserveChinaFuture: true });
    try {
      const ts = Date.now();
      localStorage.setItem(draftKeyFor('data', activeCountry, activeSeries, newKey), JSON.stringify(newData));
      localStorage.setItem(draftKeyFor('meta', activeCountry, activeSeries, newKey), JSON.stringify({ ts, preserveChinaFuture: true }));
    } catch {}

    setVersionMonths(vs => [{ key: newKey, label: formatVersionLabel(newKey) }, ...vs]);
    setMonthVersion(newKey);
    setActiveVersion(newKey);
    setEditingVariantKey(null);
    setOpLogs(ls => ([{
      id: `${Date.now()}_${Math.random().toString(16).slice(2)}`,
      ver: '',
      date: formatTS(Date.now()),
      operator: 'You',
      operation: `Add Month Version: ${activeVersion} → ${newKey}`,
    }, ...ls]));
  };

  const onImport = () => {
    if(isAllMode) return;
    const ts = Date.now();
    setAllData(d => {
      const src = INIT_ALL_DATA[activeSeries]?.variants || {};
      const clone = {};
      Object.keys(src).forEach(name => {
        clone[name] = { ...(src[name] || {}) };
      });
      const next = {
        ...d,
        [activeSeries]: {
          ...d[activeSeries],
          variants: fillDemoAllData({ [activeSeries]: { variants: clone } })[activeSeries].variants,
        },
      };
      persistDraft(next);
      return next;
    });
    setOpLogs(ls => ([{
      id: `${ts}_${Math.random().toString(16).slice(2)}`,
      ver: '',
      date: formatTS(ts),
      operator: 'You',
      operation: `${activeSeries} / Import configuration variants`,
    }, ...ls]));
  };

  const cfgMonths = MONTHS.slice(NOW_MONTH, NOW_MONTH + 6);
  const editableMonthKeys = cfgMonths.map(m => m.key);
  const cpVals = !isAllMode ? (allData?.[activeSeries]?.chinaProduction || null) : null;
  const disableImport = isAllMode;
  const importDisabledReason = isAllMode ? 'All 模式不支持 Import' : '';

  const countryWidth = calcSelectCh(COUNTRIES);
  const seriesWidth = calcSelectCh(['All', ...SERIES_LIST]);
  const versionWidth = calcSelectCh(versionMonths.map(v => v.label));

  const w15 = (w) => `calc(${w} * 1.5)`;

  return (
    <>
      {/* Filter bar */}
      <div className="card">
        <div className="filter-bar">
          <div className="filter-group">
            <label>Country</label>
            <select className="f-select" style={{width:w15(countryWidth)}} value={country} onChange={e=>setCountry(e.target.value)}>
              {COUNTRIES.map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          <div className="filter-group">
            <label>Series</label>
            <select className="f-select" style={{width:w15(seriesWidth)}} value={series} onChange={e=>setSeries(e.target.value)}>
              <option value="All">All</option>
              {SERIES_LIST.map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <div className="filter-group">
            <label>Month Version</label>
            <select className="f-select" style={{width:w15(versionWidth)}} value={monthVersion} onChange={e=>setMonthVersion(e.target.value)}>
              {versionMonths.map(v=><option key={v.key} value={v.key}>{v.label}</option>)}
            </select>
          </div>
          <div className="filter-btns">
            <button className="btn btn-default" onClick={()=>{setCountry('Norway');setSeries('X9(H93aEV)');setMonthVersion(currentVersionKey);}}>Reset</button>
            <button className="btn btn-primary" onClick={onSearch}>Search</button>
          </div>
        </div>
      </div>

      {/* Table card */}
      <div className="card">
        <div className="table-toolbar">
          {!published && <span style={{marginRight:'auto'}}></span>}
          {published && <span style={{marginRight:'auto',fontSize:12,color:'#333',fontWeight:500,background:'#f0f0f0',border:'1px solid #d9d9d9',borderRadius:10,padding:'2px 10px'}}>Submitted</span>}
          <button className="btn btn-default" onClick={() => setShowSettings(true)}>Settings</button>
          <button className="btn btn-default" onClick={() => setShowLog(true)}>Log</button>
          <button className={'btn btn-default' + (disableImport ? ' btn-disabled' : '')} title={importDisabledReason} disabled={disableImport} onClick={onImport}>Import</button>
          <button className="btn btn-default" onClick={() => alert('Exporting...')}>Export</button>
            <button className="btn btn-default" onClick={onAddVersion}>Add Month Version</button>
          <button className="btn btn-primary" onClick={() => setShowPublish(true)}>Submit</button>
        </div>

        <PlanningTable activeSeries={activeSeries} editMode={true} summaryPublished={summaryPublished}
          allData={allData} onSetCell={setCell}
          onSetVariant={setVariant}
          editingVariant={editingVariantKey} setEditingVariant={setEditingVariantKey}
          editableMonthKeys={editableMonthKeys} canEditVariantRow={true}
          calcParamsBySeries={calcParamsBySeries}
          onDeleteVariant={deleteVariant} />
      </div>

      {showSettings && <SettingsModal onClose={()=>setShowSettings(false)} rows={settingsRows} setRows={setSettingsRows} />}
      {showLog      && <LogModal      onClose={()=>setShowLog(false)} logs={opLogs} />}
      {showPublish  && <ConfirmModal onClose={()=>setShowPublish(false)} onConfirm={onPublish}
        title="Submit 5P Plan"
        body={<>You are about to submit the current 5P planning.<br/>This will create a new version and notify all stakeholders.<br/><strong>This action cannot be undone.</strong></>}
        confirmText="Confirm" />}
    </>
  );
}

// Summary uses the same month range as Submission
const ALL_SUM_MONTHS = MONTHS;
const STICKY_COLS = [
  {key:'series',   label:'Series',     w:80},
  {key:'resource', label:'Resource',   w:78},
  {key:'region',   label:'Region',     w:90},
  {key:'country',  label:'Country',    w:130},
  {key:'modelType',label:'Model Type', w:90},
  {key:'range',    label:'Range',      w:160},
];

function SummaryTab({onPublish, summaryPublished}) {
  const [sortKey, setSortKey] = useState(null);
  const [sortDir, setSortDir] = useState(1);
  const [filters, setFilters] = useState({});
  const [showLog, setShowLog] = useState(false);
  const [showPublish, setShowPublish] = useState(false);
  const [published, setPublished] = useState(false);
  const [monthVersion, setMonthVersion] = useState('2026-04');
  const [page, setPage] = useState(1);
  const [pageSize, setPageSize] = useState(20);

  const uniqueVals = (key) => [...new Set(SUM_ROWS.map(r => r[key]).filter(Boolean))].sort();
  const visibleMonths = ALL_SUM_MONTHS;

  const filtered = SUM_ROWS.filter(r => {
    const passFilter = Object.entries(filters).every(([k, v]) => !v || String(r[k]) === v);
    return passFilter;
  });

  const sorted = sortKey
    ? [...filtered].sort((a, b) => (a[sortKey] ?? '') > (b[sortKey] ?? '') ? sortDir : -sortDir)
    : filtered;

  const rowsWithId = sorted.map((r, i) => ({ ...r, __id: `${r.series || 's'}_${r.country || 'c'}_${r.range || 'r'}_${i}` }));
  const total = rowsWithId.length;
  const totalPages = Math.max(1, Math.ceil(total / pageSize));
  const pageSafe = Math.min(page, totalPages);
  const startIdx = (pageSafe - 1) * pageSize;
  const pageRows = rowsWithId.slice(startIdx, startIdx + pageSize);

  useEffect(() => {
    if (page > totalPages) setPage(totalPages);
  }, [page, totalPages]);



  const toggleSort = (k) => {
    if (sortKey === k) setSortDir(d => -d);
    else { setSortKey(k); setSortDir(1); }
  };
  const setFilter = (k, v) => { setFilters(f => ({ ...f, [k]: v })); setPage(1); };

  const resetSearch = () => {
    setFilters({});
    setMonthVersion('2026-04');
    setPage(1);
  };

  const stickyOffsets = STICKY_COLS.reduce((acc, c, i) => {
    acc[c.key] = i === 0 ? 0 : acc[STICKY_COLS[i - 1].key] + STICKY_COLS[i - 1].w;
    return acc;
  }, {});



  const pageNums = [];
  for (let i = 1; i <= totalPages; i++) {
    if (totalPages <= 7 || i === 1 || i === totalPages || Math.abs(i - pageSafe) <= 1) pageNums.push(i);
  }

  return (
    <div className="card">


      {/* Filter area - only Reset and Search buttons */}
      <div className="list-search-bar">
        {['series', 'resource', 'region', 'country'].map(k => (
          <div key={k} style={{ display: 'flex', flexDirection: 'column', gap: 3 }}>
            <label className="mini-label">{STICKY_COLS.find(c => c.key === k)?.label || k}</label>
            <select className="f-select" style={{ height: 28, fontSize: 12, minWidth: 150 }} value={filters[k] || ''} onChange={e => setFilter(k, e.target.value)}>
              <option value="">All</option>
              {uniqueVals(k).map(v => <option key={v} value={v}>{v}</option>)}
            </select>
          </div>
        ))}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 3 }}>
          <label className="mini-label">Month Version</label>
          <select className="f-select" style={{ height: 28, fontSize: 12, minWidth: 180 }} value={monthVersion} onChange={e => setMonthVersion(e.target.value)}>
            {VERSION_MONTHS.map(v => <option key={v.key} value={v.key}>{v.label}</option>)}
          </select>
        </div>
        <div style={{ marginLeft: 'auto', display: 'flex', gap: '8px' }}>
          <button className="btn btn-default" style={{ height: 28, fontSize: 12 }} onClick={resetSearch}>Reset</button>
          <button className="btn btn-primary" style={{ height: 28, fontSize: 12 }} onClick={() => {/* Search functionality - filters are applied automatically */}}>Search</button>
        </div>
      </div>

      {/* Action buttons toolbar - positioned at top-right of list area */}
      <div className="table-toolbar">
        <span style={{marginRight:'auto'}}></span>
        <button className="btn btn-default" style={{ fontSize: 12, height: 28 }} onClick={() => setShowLog(true)}>Log</button>
        <button className="btn btn-default" style={{ fontSize: 12, height: 28 }} onClick={() => alert('Exporting...')}>Export</button>
        <button className="btn btn-primary" style={{ fontSize: 12, height: 28 }} onClick={() => setShowPublish(true)} disabled={summaryPublished}>{summaryPublished ? 'Locked' : 'Lock'}</button>
      </div>

      <div className="tbl-wrap">
        <table>
          <thead>
            <tr>
              {STICKY_COLS.map(c => (
                <th key={c.key} className={'th-field' + (sortKey === c.key ? ' active' : '')}
                  style={{ left: stickyOffsets[c.key], width: c.w, minWidth: c.w, textAlign: 'left', zIndex: 2, background: '#fafafa' }}
                  onClick={() => toggleSort(c.key)}>
                  {c.label}
                </th>
              ))}
              {visibleMonths.map(m => (
                <th key={m.key} className={'month-col' + (m.cur ? ' th-cur' : '')} style={{ minWidth: 88 }}>
                  {m.label}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {pageRows.map(r => (
              <tr key={r.__id}>
                {STICKY_COLS.map((c, ci) => (
                  <td key={c.key} className="td-field"
                    style={{
                      left: stickyOffsets[c.key], textAlign: 'left', fontWeight: ci === 0 ? 600 : 400,
                      borderRight: ci === STICKY_COLS.length - 1 ? '2px solid #e8e8e8' : '1px solid #f0f0f0',
                      background: '#fafafa', minWidth: c.w, width: c.w
                    }}>
                    {r[c.key] || ''}
                  </td>
                ))}
                {visibleMonths.map(m => (
                  <td key={m.key} className={m.cur ? 'td-cur' : ''}>
                    {r[m.key] !== null && r[m.key] !== undefined ? r[m.key] : '0'}
                  </td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div className="pager">
        <button className="pg-btn" disabled={pageSafe <= 1} onClick={() => setPage(p => Math.max(1, p - 1))}>‹</button>
        {pageNums.map((n, idx) => (
          <React.Fragment key={`pg_${n}_${idx}`}>
            {idx > 0 && pageNums[idx - 1] !== n - 1 && <span style={{ padding: '0 4px' }}>...</span>}
            <button className={'pg-btn' + (n === pageSafe ? ' active' : '')} onClick={() => setPage(n)}>{n}</button>
          </React.Fragment>
        ))}
        <button className="pg-btn" disabled={pageSafe >= totalPages} onClick={() => setPage(p => Math.min(totalPages, p + 1))}>›</button>
        <select className="f-select" style={{ height: 26, fontSize: 12, minWidth: 70 }} value={String(pageSize)} onChange={e => { setPageSize(parseInt(e.target.value, 10)); setPage(1); }}>
          <option value="20">20 / page</option>
          <option value="50">50 / page</option>
          <option value="100">100 / page</option>
        </select>
      </div>

      {showLog && <LogModal onClose={() => setShowLog(false)} mode="summaryProd" monthVersion={monthVersion} />}
      {showPublish && <ConfirmModal onClose={() => setShowPublish(false)} onConfirm={() => { onPublish(); setShowPublish(false); }}
        title="Lock 5P Summary"
        body={<>You are about to lock the current 5P Summary data.<br />This will freeze the data and prevent further edits in Submission.<br /><strong>This action cannot be undone.</strong></>}
        confirmText="Confirm" />}
    </div>
  );
}

/* ─── APP ─── */
function PlaceholderTab({title}) {
  return (
    <div className="card" style={{padding:'40px 24px',textAlign:'center',color:'#999',fontSize:14}}>
      <div style={{fontSize:28,marginBottom:12}}>🚧</div>
      <div><strong>{title}</strong></div>
      <div style={{marginTop:6,fontSize:12}}>This tab is under construction.</div>
    </div>
  );
}

const TABS = [
  {key:'submission',       label:'5P Submission'},
  {key:'summaryProd',      label:'5P Summary (Production)'},
  {key:'summaryDelivery',  label:'5P Summary (Delivery)'},
  {key:'kdSummary',        label:'KD Summary'},
  {key:'cbuSummary',       label:'CBU Summary'},
  {key:'salesTarget',      label:'Sales Target'},
];

function App() {
  const [tab, setTab] = useState('submission');
  const [summaryPublished, setSummaryPublished] = useState(false);

  const renderTab = () => {
    switch(tab) {
      case 'submission':      return <SubmissionTab summaryPublished={summaryPublished} />;
      case 'summaryProd':     return <SummaryTab onPublish={()=>setSummaryPublished(true)} summaryPublished={summaryPublished} />;
      case 'summaryDelivery': return <PlaceholderTab title="5P Summary (Delivery)" />;
      case 'kdSummary':       return <PlaceholderTab title="KD Summary" />;
      case 'cbuSummary':      return <PlaceholderTab title="CBU Summary" />;
      case 'salesTarget':     return <PlaceholderTab title="Sales Target" />;
      default:                return null;
    }
  };

  return (
    <div>
      <div className="top-bar">
        {TABS.map(t=>(
          <div key={t.key} className={'tab'+(tab===t.key?' active':'')} onClick={()=>setTab(t.key)}>
            {t.label}
          </div>
        ))}
      </div>
      <div className="page">
        {renderTab()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
